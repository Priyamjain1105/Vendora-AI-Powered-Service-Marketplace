{% extends "base.html" %}
{% block title %}Vendor Profile{% endblock %}

{% block content %}
<div class="bg-gray-100 min-h-screen py-12 px-4">

    <div class="container mx-auto max-w-3xl">

        <!-- Page Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-semibold text-gray-800">Complete Your Vendor Profile</h1>
            <p class="text-gray-600 mt-2">Provide accurate details to help customers find and trust your business.</p>
        </div>

        <!-- Form Wrapper -->
        <div class="bg-white rounded-3xl shadow-lg p-8">
            <form action="{{ url_for('vendor.profile_setup') }}" method="POST" enctype="multipart/form-data"
                class="space-y-6">

                <!-- Name & Email -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-gray-700 font-medium">Your Name*</label>
                        <input type="text" name="name" required
                            class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                            placeholder="Your Name">
                    </div>

                    <div>
                        <label class="text-gray-700 font-medium">Email*</label>
                        <input type="email" name="email" required
                            class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                            placeholder="Email Address">
                    </div>
                </div>

                <!-- Business Details -->
                <div>
                    <label class="text-gray-700 font-medium">Business / Shop Name*</label>
                    <input type="text" name="business_name" required
                        class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                        placeholder="Your Business Name">
                </div>

                <div>
                    <label class="text-gray-700 font-medium">Business Address*</label>
                    <input type="text" name="business_address" required
                        class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                        placeholder="Shop Address">
                </div>

                <!-- Phone + WhatsApp -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-gray-700 font-medium">Phone Number*</label>
                        <input type="text" name="phone_number" required
                            class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                            placeholder="Phone Number">
                    </div>

                    <div>
                        <label class="text-gray-700 font-medium">WhatsApp Number</label>
                        <input type="text" name="whatsapp_number"
                            class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                            placeholder="WhatsApp Number">
                    </div>
                </div>

                <!-- Business Timing + Payment -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-gray-700 font-medium">Business Timings</label>
                        <input type="text" name="open_duration"
                            class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                            placeholder="10 AM - 8 PM">
                    </div>

                    <div>
                        <label class="text-gray-700 font-medium">Payment Type</label>
                        <input type="text" name="payment_type"
                            class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                            placeholder="UPI / Cash / Card">
                    </div>
                </div>

                <!-- Year -->
                <div>
                    <label class="text-gray-700 font-medium">Year of Establishment</label>
                    <input type="number" name="year_of_establishment"
                        class="w-full mt-2 p-3 rounded-xl border border-gray-300 focus:border-blue-700 focus:ring-2 focus:ring-blue-200 transition outline-none"
                        placeholder="e.g., 2012">
                </div>

                <!-- File Input -->
                <div>
                    <label class="block text-gray-700 mb-1 font-medium">
                        Business Image
                    </label>

                    <input type="file" name="image" accept="image/*" multiple required class="w-full text-gray-700 bg-gray-50 border border-gray-300 
                              rounded-lg px-4 py-2 file:mr-4 file:py-2 file:px-4 file:rounded-lg 
                              file:border-0 file:text-white file:bg-blue-600 hover:file:bg-blue-700 cursor-pointer">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full py-3 mt-4 bg-blue-700 hover:bg-blue-800 text-white rounded-xl text-lg font-medium transition shadow-md">
                    Save Profile
                </button>

            </form>
        </div>

    </div>
</div>
{% endblock %}
