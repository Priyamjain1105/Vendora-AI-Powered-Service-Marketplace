{% extends "base.html" %}

{% block title %}Profile Update{% endblock %}

{% block head_content %}
<!-- Extra styling if needed -->
{% endblock %}

{% block content %}

<div class="min-h-screen bg-gray-100 py-10">
    <div class="max-w-xl mx-auto bg-white shadow-lg rounded-2xl p-8">

        <h1 class="text-3xl font-semibold text-gray-800 text-center mb-6">
            Update Profile
        </h1>

        <form action="{{ url_for('auth.profile_update') }}" method="POST" enctype="multipart/form-data"
            class="space-y-5">

            <!-- Name Input -->
            <div>
                <label class="block text-gray-700 mb-1 font-medium">Name</label>
                <input type="text" name="name" placeholder="Enter your name" value="{{current_user.name}}" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 
                              focus:ring-blue-500 focus:outline-none shadow-sm">
            </div>

            <!-- File Input -->
            <div>
                <label class="block text-gray-700 mb-1 font-medium">
                    Profile Picture
                </label>

                <input type="file" name="image" accept="image/*" required class="w-full text-gray-700 bg-gray-50 border border-gray-300 
                              rounded-lg px-4 py-2 file:mr-4 file:py-2 file:px-4 file:rounded-lg 
                              file:border-0 file:text-white file:bg-blue-600 hover:file:bg-blue-700 cursor-pointer">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg text-lg font-medium 
                           hover:bg-blue-700 transition-all">
                Submit
            </button>

        </form>

        <!-- Uploaded Image Preview -->
        <hr class="my-8">

        <h1 class="text-2xl font-semibold text-gray-800 text-center mb-4">
            Uploaded Image
        </h1>

        {% if current_user.profile_img %}
        <div class="flex justify-center">
            <img src="{{ current_user.profile_img }}" class="w-40 h-40 rounded-full shadow-md object-cover">
        </div>
        {% else %}
        <p class="text-center text-gray-500">No image uploaded yet.</p>
        {% endif %}

    </div>
</div>

{% endblock %}

{% block scripts %}
<!-- Page-specific JavaScript here -->
{% endblock %}
