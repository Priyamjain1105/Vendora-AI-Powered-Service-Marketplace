{% extends "authbase.html" %}

{% block title %}Login | Vendora{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#f8fafc] flex items-center justify-center py-12 px-4 relative overflow-hidden">

    <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full filter blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-600/5 rounded-full filter blur-3xl"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <a href="/" class="text-3xl font-black text-gray-900 tracking-tighter">
                VENDORA<span class="text-primary">.</span>
            </a>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/5 border border-gray-100 p-8 sm:p-12">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-gray-900 mb-2">Welcome Back</h1>
                <p class="text-gray-500 font-medium">Log in to your account to continue</p>
            </div>

            <div class="bg-gray-100 p-1.5 rounded-2xl flex mb-8 relative">
                <button type="button" onclick="setRole('customer')" id="btn-customer"
                    class="flex-1 py-3 rounded-xl text-sm font-black transition-all z-10 bg-gray-900 text-white shadow-sm">
                    Customer
                </button>
                <button type="button" onclick="setRole('vendor')" id="btn-vendor"
                    class="flex-1 py-3 rounded-xl text-sm font-black transition-all z-10 text-gray-500">
                    Vendor
                </button>
            </div>

            <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-5">
                <input type="hidden" name="role" id="login-role" value="customer">

                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Username</label>
                    <div class="relative group">
                        <input type="text" name="username" placeholder="cookie.monster" required
                            class="w-full pl-5 pr-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:ring-0 outline-none transition-all text-gray-700 font-medium">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label
                            class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Password</label>
                        <a href="#"
                            class="text-[10px] font-black text-primary uppercase tracking-widest hover:underline">Forgot?</a>
                    </div>
                    <input type="password" name="password" placeholder="••••••••" required
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:ring-0 outline-none transition-all text-gray-700 font-medium">
                </div>

                <button type="submit"
                    class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black text-lg hover:bg-primary transition shadow-xl shadow-blue-900/10 active:scale-[0.98] mt-4">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500 font-medium">
                    New to Vendora?
                    <a href="{{ url_for('auth.signup') }}" class="text-primary font-black hover:underline ml-1">Create
                        Account</a>
                </p>
            </div>
        </div>

        <div class="mt-8 bg-blue-50/50 backdrop-blur-sm border border-blue-100 rounded-2xl p-4">
            <div class="flex items-center gap-3">
                <span class="text-blue-500 text-lg">💡</span>
                <p class="text-[11px] text-blue-700 leading-relaxed">
                    <span class="font-black uppercase tracking-tighter mr-2">Demo:</span>
                    User: <code class="bg-white px-1 rounded font-bold">cookie.monster</code> |
                    Pass: <code class="bg-white px-1 rounded font-bold">cookie4life</code>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    function setRole(role) {
        const roleInput = document.getElementById('login-role');
        const custBtn = document.getElementById('btn-customer');
        const vendBtn = document.getElementById('btn-vendor');

        roleInput.value = role;

        if (role === 'vendor') {
            vendBtn.classList.add('bg-gray-900', 'text-white', 'shadow-sm');
            vendBtn.classList.remove('text-gray-500');
            custBtn.classList.remove('bg-gray-900', 'text-white', 'shadow-sm');
            custBtn.classList.add('text-gray-500');
        } else {
            custBtn.classList.add('bg-gray-900', 'text-white', 'shadow-sm');
            custBtn.classList.remove('text-gray-500');
            vendBtn.classList.remove('bg-gray-900', 'text-white', 'shadow-sm');
            vendBtn.classList.add('text-gray-500');
        }
    }
</script>
{% endblock %}
