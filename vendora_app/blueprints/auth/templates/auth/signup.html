{% extends "authbase.html" %}

{% block title %}Sign Up | Vendora{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#f8fafc] flex items-center justify-center py-12 px-4 relative overflow-hidden">

    <div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full filter blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-600/5 rounded-full filter blur-3xl"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-black text-gray-900 tracking-tighter">
                VENDORA<span class="text-primary">.</span>
            </a>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/5 border border-gray-100 p-8 sm:p-12">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-gray-900 mb-2">Create Account</h1>
                <p class="text-gray-500 font-medium">Join the community today</p>
            </div>

            <div class="bg-gray-100 p-1.5 rounded-2xl flex mb-8 relative">
                <button type="button" onclick="setRole('customer')" id="btn-customer"
                    class="flex-1 py-3 rounded-xl text-sm font-black transition-all z-10 bg-gray-900 text-white shadow-sm">
                    Customer
                </button>
                <button type="button" onclick="setRole('vendor')" id="btn-vendor"
                    class="flex-1 py-3 rounded-xl text-sm font-black transition-all z-10 text-gray-500">
                    Vendor
                </button>
            </div>

            <form action="{{ url_for('auth.signup') }}" method="POST" class="space-y-5" id="signupForm">
                <input type="hidden" name="role" id="signup-role" value="customer">

                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a unique name" required
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:ring-0 outline-none transition-all text-gray-700 font-medium">
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:ring-0 outline-none transition-all text-gray-700 font-medium">
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Confirm
                        Password</label>
                    <input type="password" id="confirm_password" placeholder="••••••••" required
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:ring-0 outline-none transition-all text-gray-700 font-medium">
                    <p id="passwordError"
                        class="text-red-500 text-[10px] font-bold uppercase tracking-wider mt-2 ml-1 hidden">
                        <i class="fas fa-exclamation-circle mr-1"></i> Passwords do not match
                    </p>
                </div>

                <button type="submit"
                    class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black text-lg hover:bg-primary transition shadow-xl shadow-blue-900/10 active:scale-[0.98] mt-4">
                    Create Account
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500 font-medium">
                    Already a member?
                    <a href="{{ url_for('auth.login') }}" class="text-primary font-black hover:underline ml-1">Log
                        In</a>
                </p>
            </div>
        </div>

        <p class="mt-8 text-center text-[10px] text-gray-400 font-medium px-8 leading-relaxed">
            By signing up, you agree to our <b>Terms of Service</b> and <b>Privacy Policy</b>.
        </p>
    </div>
</div>

<script>
    // Role Switching Logic
    function setRole(role) {
        const roleInput = document.getElementById('signup-role');
        const custBtn = document.getElementById('btn-customer');
        const vendBtn = document.getElementById('btn-vendor');

        roleInput.value = role;

        if (role === 'vendor') {
            vendBtn.classList.add('bg-gray-900', 'text-white', 'shadow-sm');
            vendBtn.classList.remove('text-gray-500');
            custBtn.classList.remove('bg-gray-900', 'text-white', 'shadow-sm');
            custBtn.classList.add('text-gray-500');
        } else {
            custBtn.classList.add('bg-gray-900', 'text-white', 'shadow-sm');
            custBtn.classList.remove('text-gray-500');
            vendBtn.classList.remove('bg-gray-900', 'text-white', 'shadow-sm');
            vendBtn.classList.add('text-gray-500');
        }
    }

    // Password Match Logic
    const form = document.getElementById("signupForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm_password");
    const errorMsg = document.getElementById("passwordError");

    form.addEventListener("submit", function (e) {
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            errorMsg.classList.remove("hidden");
            confirmPassword.classList.add("border-red-400");
            confirmPassword.classList.remove("focus:border-primary");
        } else {
            errorMsg.classList.add("hidden");
            confirmPassword.classList.remove("border-red-400");
        }
    });
</script>
{% endblock %}
